# Railway.toml configuration for StudEx Backend

[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --noinput"

[deploy]
startCommand = "python manage.py migrate && gunicorn studex.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

[healthcheck]
path = "/admin/"
timeout = 100
interval = 60
